# MorshLive Bridge — Nginx
# Serves HLS streams from decap-stream with CORS for korazero.com

server {
    listen 80;
    server_name _;

    # —— HLS streams — proxied from decap-stream ——————————————
    location /hls/ {
        proxy_pass http://bridge:3000/api/hls/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) { return 204; }

        proxy_buffering off;
        proxy_cache off;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    # —— Decap Stream Web UI (manage streams, VNC) —————————————
    location /ui/ {
        rewrite ^/ui/(.*) /$1 break;
        proxy_pass http://bridge:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # —— Health ——————————————————————————————————————————————————
    location /health {
        return 200 "bridge ok\n";
        add_header Content-Type text/plain;
    }
}
