# MorshLive Bridge — Nginx
# Serves HLS streams from decap-stream with CORS pinned to korazero.com

server {
    listen 80;
    server_name _;

    # —— Health ——————————————————————————————————————————————————
    location = /health {
        return 200 "bridge ok\n";
        add_header Content-Type text/plain;
        add_header Access-Control-Allow-Origin "https://korazero.com" always;
    }

    # —— HLS streams — proxied from decap-stream ——————————————
    location /hls/ {
        proxy_pass http://bridge:3000/api/hls/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # CORS: pinned to korazero.com only
        add_header Access-Control-Allow-Origin "https://korazero.com" always;
        add_header Vary "Origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Range" always;
        if ($request_method = OPTIONS) { return 204; }

        # Cache: no-store for live HLS manifests and segments
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        proxy_buffering off;
        proxy_cache off;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    # —— Decap Stream Web UI — locked to localhost only (admin via SSH tunnel) ——
    # To administer, SSH tunnel: ssh -L 8080:127.0.0.1:80 user@bridge-host
    # Then visit http://localhost:8080/ui/
    location /ui/ {
        allow 127.0.0.1;
        deny all;

        rewrite ^/ui/(.*) /$1 break;
        proxy_pass http://bridge:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # —— VNC — also localhost only ———————————————————————————————
    location /vnc/ {
        allow 127.0.0.1;
        deny all;

        proxy_pass http://bridge:6080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}
