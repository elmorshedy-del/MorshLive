        <div class="wc-trophy-wrap">
          <div class="wc-trophy" id="wcTrophy">🏆</div>
        </div>
        <div class="wc-content">
          <div class="wc-eyebrow">FIFA™</div>

          frameborder="0"
          scrolling="yes"
          allowfullscreen="true"
          allow="autoplay; encrypted-media; fullscreen"
          referrerpolicy="no-referrer"

      </div>

      <div class="watch-grid">
        <div>
          <div class="now-playing">
            <h1><span id="ch-name">القناة</span> <span id="ch-status"></span></h1>
            <div class="sub" id="now-sub"></div>

            <div class="server-row" id="servers"></div>
