name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: "Cloudflare API token (cfat_…, Workers Edit permission)"
        required: true
        type: string
      cloudflare_account_id:
        description: "Cloudflare account ID (optional if CLOUDFLARE_ACCOUNT_ID secret is set)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set Cloudflare credentials
        env:
          DISPATCH_TOKEN: ${{ github.event.inputs.cloudflare_api_token }}
          DISPATCH_ACCOUNT: ${{ github.event.inputs.cloudflare_account_id }}
          SECRET_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SECRET_TOKEN5: ${{ secrets.CLOUDFLARE_TOKEN5 }}
          SECRET_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TOKEN=""
          if [ -n "${DISPATCH_TOKEN:-}" ]; then
            TOKEN="$DISPATCH_TOKEN"
            echo "Using token from workflow_dispatch input"
          elif [ -n "${SECRET_TOKEN:-}" ]; then
            TOKEN="$SECRET_TOKEN"
            echo "Using CLOUDFLARE_API_TOKEN repository secret"
          elif [ -n "${SECRET_TOKEN5:-}" ]; then
            TOKEN="$SECRET_TOKEN5"
            echo "Using CLOUDFLARE_TOKEN5 repository secret"
          fi
          TOKEN="${TOKEN// /}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No Cloudflare token. Paste cfat_ token when running workflow, or add CLOUDFLARE_API_TOKEN secret."
            exit 1
          fi
          ACCOUNT="${SECRET_ACCOUNT:-${DISPATCH_ACCOUNT:-}}"
          if [ -z "$ACCOUNT" ]; then
            echo "::error::No account ID. Add CLOUDFLARE_ACCOUNT_ID repository secret or pass cloudflare_account_id when running workflow."
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT" >> "$GITHUB_ENV"

      - name: Verify token can deploy Worker
        run: node scripts/verify-deploy-token.js

      - name: Deploy morshlive Worker (static assets + /wk proxy)
        run: npx wrangler@3 deploy
