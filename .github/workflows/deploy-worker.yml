# DEPRECATED — use Cloudflare Workers Builds (see docs/DEPLOY.md).
# Disabled on push to avoid GitHub Actions billing. Merge to main → CF Builds deploys.
#
# Emergency manual deploy only:
#   GitHub → Actions → Deploy Worker (morshlive) → Run workflow
name: Deploy Worker (morshlive)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy
