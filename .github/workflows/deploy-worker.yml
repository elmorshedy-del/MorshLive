# Deploy the morshlive Worker to production on every push to main.
# Fixes the gap where merges to main were not reaching production.
#
# Requires repo secret CLOUDFLARE_API_TOKEN with "Workers Scripts: Edit"
# permission on the account in wrangler.toml. CLOUDFLARE_ACCOUNT_ID is optional
# (account_id is already set in wrangler.toml).
name: Deploy Worker (morshlive)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy
