# Request Gemini Code Assist review on every PR (backup if app delay).
# Requires Gemini Code Assist GitHub App installed on the repo.
name: Request Gemini review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  gemini-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Ask Gemini to review
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = `<!-- gemini-review-${sha} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            if (comments.some((c) => c.body && c.body.includes(marker))) {
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `${marker}\n/gemini review`,
            });
