# Request Gemini Code Assist review on PRs.
# Disabled on pull_request — GitHub Actions billing is locked on this account
# (see deploy-worker.yml). Use manual trigger or comment /gemini review on the PR.
#
# Manual: GitHub → Actions → Request Gemini review → Run workflow (PR number input)
name: Request Gemini review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: Ask Gemini to review
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number.parseInt('${{ inputs.pr_number }}', 10);
            if (!Number.isFinite(pr) || pr <= 0) {
              core.setFailed('Invalid pr_number input');
              return;
            }
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
            });
            const sha = pull.head.sha;
            const marker = `<!-- gemini-review-${sha} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            if (comments.some((c) => c.body && c.body.includes(marker))) {
              core.info('Gemini review comment already exists for this SHA');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `${marker}\n/gemini review`,
            });
