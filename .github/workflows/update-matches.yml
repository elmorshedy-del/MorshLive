name: Update today's matches

# DEPRECATED on schedule — use Cloudflare Workers Builds build_command (npm run refresh:matches)
# or run manually / via agent. See docs/DEPLOY.md
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch today's fixtures
        env:
          SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run refresh:matches

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- assets/data/today.json assets/data/live-snapshot.json assets/js/channel-bindings.js assets/data/match-poll.json assets/data/tournament-archive.json assets/data/match-memes.json; then
            git add assets/data/today.json assets/data/live-snapshot.json assets/js/channel-bindings.js assets/data/match-poll.json assets/data/tournament-archive.json assets/data/match-memes.json
            git commit -m "chore: refresh matches, polls, and tournament ملخصات archive"
            git push
          else
            echo "No changes."
          fi
