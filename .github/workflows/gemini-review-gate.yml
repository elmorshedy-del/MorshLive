# Fail PR checks until Gemini Code Assist finishes review (optional required check).
# Disabled on pull_request — GitHub Actions billing is locked on this account.
# Poll locally instead: node scripts/poll-gemini-review.js <PR_NUMBER>
#
# Manual: GitHub → Actions → Gemini review gate → Run workflow (PR number input)
name: Gemini review gate

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  pull-requests: read
  contents: read

jobs:
  await-gemini-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for Gemini Code Assist review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/poll-gemini-review.js ${{ inputs.pr_number }}
