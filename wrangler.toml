# Cloudflare Workers static assets — morshlive (production)
# Production CI: Cloudflare Workers Builds on push to main (see docs/DEPLOY.md).
# Manual: npm run deploy  |  npx wrangler deploy
# API token: .env locally (see .env.example), never commit it.

name = "morshlive"
main = "worker.js"
compatibility_date = "2024-06-01"
account_id = "f06dda0c02d25976dcda319e942e432c" # pragma: allowlist secret

# REQUIRED secret for the signed stream proxy (worker.js). Without it the /wk/hls
# proxy falls back to the static host allowlist and will black out the next time
# worldkoora rotates its CDN host. Set it once per environment (not committed):
#   npx wrangler secret put STREAM_SIGNING_SECRET
#   npx wrangler secret put YOUTUBE_API_KEY   # Arabic replay clips (YouTube Data API v3)
#   npx wrangler secret put TWITTER_BEARER_TOKEN  # viral match memes (X API v2)
#   npx wrangler secret put TWITCH_CLIENT_ID        # Helix: verify Twitch relay is LIVE
#   npx wrangler secret put TWITCH_CLIENT_SECRET    # (dev.twitch.tv/console → Register App)
#   npx wrangler secret put XTREAM_PORTALS_JSON      # authorized Xtream portal export JSON
#   npx wrangler secret put XTREAM_TOKEN_SECRET      # optional dedicated IPTV media-token key
# Use any long random string, e.g.:  openssl rand -hex 32

[assets]
directory = "."
binding = "ASSETS"
# Static HTML/JS/CSS is served without invoking the Worker (saves daily request quota).
# Only stream proxy paths run worker.js. Error 1027 = free-tier 100k/day exceeded.
run_worker_first = ["/wk/*", "/dl/*", "/lab/*", "/sir/*", "/api/*", "/replay/*"]
not_found_handling = "404-page"

# If visitors see Error 1027 (100k/day free limit), either upgrade Workers Paid ($5/mo)
# or set the route failure mode to "Fail open" in Dashboard → Workers → morshlive → Routes.
# You can also add the domain in Dashboard → Workers → morshlive → Domains.
[[routes]]
pattern = "korazero.com/*"
zone_name = "korazero.com"

[[routes]]
pattern = "www.korazero.com/*"
zone_name = "korazero.com"
